<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaradh Tutors | Premium Tutoring Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366F1',
                        surface: '#0a0a0a',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
        .text-gradient { background: linear-gradient(135deg, #6366F1 0%, #a855f7 50%, #ec4899 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover { transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .card-hover:hover { transform: translateY(-10px); border-color: #6366F1; box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2); }
        .animate-fade-in { animation: fadeIn 1s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 glass py-5 px-8 flex justify-between items-center transition-all duration-300">
        <h1 class="text-2xl font-bold tracking-tighter">AARADH<span class="text-primary">.</span>TUTORS</h1>
        <div class="hidden md:flex gap-8 text-sm font-semibold text-gray-300">
            <a href="#how" class="hover:text-primary transition">How it Works</a>
            <a href="#categories" class="hover:text-primary transition">Subjects</a>
            <a href="#register" class="bg-white/10 px-6 py-2 rounded-full hover:bg-white/20 transition">Join as Tutor</a>
        </div>
    </nav>

    <header class="min-h-screen flex flex-col justify-center items-center pt-20 px-6 text-center">
        <div class="animate-fade-in">
            <h2 class="text-7xl md:text-9xl font-black mb-6 leading-tight">Find Your <br><span class="text-gradient">Perfect Tutor</span></h2>
            <p class="text-gray-400 text-xl max-w-2xl mb-12">Elite home and online tutoring. Patna's smartest students learn here.</p>
            <div class="flex gap-4 justify-center">
                <a href="#request" class="bg-primary px-10 py-4 rounded-xl font-bold text-lg hover:scale-105 transition shadow-lg shadow-primary/30">Find a Tutor</a>
                <a href="#register" class="glass px-10 py-4 rounded-xl font-bold text-lg hover:bg-white/10 transition">Become a Tutor</a>
            </div>
        </div>
    </header>

    <section id="categories" class="py-20 px-8">
        <h3 class="text-5xl font-bold text-center mb-16 animate-fade-in">Subject Expertise</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-6xl mx-auto">
            <div class="glass p-8 rounded-3xl card-hover text-center">
                <i class="fas fa-calculator text-4xl mb-6 text-primary"></i>
                <p class="font-bold text-lg">Math</p>
            </div>
            <div class="glass p-8 rounded-3xl card-hover text-center">
                <i class="fas fa-microscope text-4xl mb-6 text-purple-500"></i>
                <p class="font-bold text-lg">Science</p>
            </div>
            <div class="glass p-8 rounded-3xl card-hover text-center">
                <i class="fas fa-book-open text-4xl mb-6 text-pink-500"></i>
                <p class="font-bold text-lg">English</p>
            </div>
            <div class="glass p-8 rounded-3xl card-hover text-center">
                <i class="fas fa-atom text-4xl mb-6 text-blue-400"></i>
                <p class="font-bold text-lg">Physics</p>
            </div>
        </div>
    </section>

    <!-- WhatsApp Floating Action -->
    <a href="https://wa.me/917764812598" class="fixed bottom-8 right-8 bg-green-500 p-5 rounded-full text-white shadow-2xl hover:scale-110 transition z-50 animate-bounce">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>
</body>
</html>
